---
- name: Deploy Laravel application
  hosts: webservers
  connection: local
  gather_facts: no

  tasks:
    - name: Display deployment info
      debug:
        msg: "Deploying Laravel application from {{ playbook_dir }}/.."

    - name: Verify application files exist
      stat:
        path: "{{ playbook_dir }}/../public/build/manifest.json"
      register: build_check
      delegate_to: localhost

    - name: Confirm build artifacts
      debug:
        msg: "Build artifacts verified successfully"
      when: build_check.stat.exists

    - name: Fail if build artifacts missing
      fail:
        msg: "Build artifacts not found - build stage may have failed"
      when: not build_check.stat.exists
